name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify with Maven
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          SPRING_PROFILES_ACTIVE: test
        run: mvn -B clean verify
